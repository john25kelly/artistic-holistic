name = "artistic-holistic"
compatibility_date = "2024-09-23"

# Run the React build before wrangler attempts to upload assets.
[build]
command = "npm run build"

# Serve the React production build as a static Workers Assets site.
# The CI build step (npm run build) must run before wrangler deploy.
[assets]
directory = "./build"
not_found_handling = "single-page-application"

